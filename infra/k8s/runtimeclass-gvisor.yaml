# gVisor runtime class: a user-space kernel between sandboxed code and the
# host kernel. Combine with HARNESS_K8S_RUNTIME_CLASS=gvisor so every sandbox
# pod gets the extra boundary (defense in depth on top of the pod's
# securityContext + deny-all NetworkPolicy).
#
# Requires nodes with containerd + runsc installed (GKE Sandbox, or
# https://gvisor.dev/docs/user_guide/install/). Kata Containers works the
# same way with handler `kata`.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
