# Backing services for the integration test suite.
#
#   docker compose -f infra/docker-compose.test.yml up -d
#   HARNESS_TEST_POSTGRES_URL=postgresql://harness:harness@localhost:5544/harness_test \
#     make test-integration
#   docker compose -f infra/docker-compose.test.yml down -v
#
# Non-default host ports so a dev's "real" redis/postgres are never touched.
services:
  redis-test:
    image: redis:7-alpine
    ports: ["6399:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness_test
    ports: ["5544:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 2s
      timeout: 2s
      retries: 15
