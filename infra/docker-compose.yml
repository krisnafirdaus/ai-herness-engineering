# ─────────────────────────────────────────────────────────────────────────────
# Production-shaped local topology:
#
#   api  ──enqueue──>  redis  ──consume──>  worker(s)  ──drive──>  sandbox
#    │                                          │                 (per-run,
#    └──────────────> postgres <────────────────┘                 host daemon)
#
# Scale workers horizontally:  docker compose up -d --scale worker=4
#
# Prereqs (once):
#   docker build -t harness-sandbox:latest -f infra/Dockerfile.sandbox .
#
# api/worker reach the HOST docker daemon (mounted socket) to launch sandbox
# containers, and share the host ./workspaces dir so bind-mount paths resolve on
# the host (HARNESS_HOST_WORKSPACES_ROOT). See src/sandbox/docker_runner.py.
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports: ["6379:6379"]

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      HARNESS_DATABASE_URL: postgresql://harness:harness@postgres:5432/harness
      HARNESS_QUEUE: redis
      HARNESS_REDIS_URL: redis://redis:6379/0
      HARNESS_SANDBOX: docker
      HARNESS_SANDBOX_IMAGE: harness-sandbox:latest
      HARNESS_LLM_PROVIDER: ${HARNESS_LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HARNESS_HOST_WORKSPACES_ROOT: ${PWD}/workspaces/runs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../workspaces:/app/workspaces
    ports: ["8000:8000"]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: ["python", "-m", "src.worker"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      HARNESS_DATABASE_URL: postgresql://harness:harness@postgres:5432/harness
      HARNESS_QUEUE: redis
      HARNESS_REDIS_URL: redis://redis:6379/0
      HARNESS_SANDBOX: docker
      HARNESS_SANDBOX_IMAGE: harness-sandbox:latest
      HARNESS_LLM_PROVIDER: ${HARNESS_LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HARNESS_HOST_WORKSPACES_ROOT: ${PWD}/workspaces/runs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../workspaces:/app/workspaces

volumes:
  pgdata:
